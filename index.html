<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fraction Fighters — Add & Subtract</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1226;
    --panel: #1b2046;
    --accent: #ffd23f;
    --good: #4ade80;
    --bad: #f87171;
    --text: #e8ecff;
    --muted: #9aa3d0;
  }
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 20%, #2a2f6a 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #game {
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 4px solid #3a3f7a;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 18px 50px rgba(0,0,0,.5);
  }
  h1 {
    text-align: center;
    color: var(--accent);
    font-size: 28px;
    margin-bottom: 6px;
    text-shadow: 2px 2px 0 #000;
  }
  .subtitle { text-align:center; color: var(--muted); margin-bottom: 14px; font-size: 14px; }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #12163a;
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .hud .stat b { color: var(--accent); }
  .progress {
    flex: 1;
    height: 14px;
    background: #0a0d24;
    border-radius: 8px;
    margin: 0 14px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4ade80, #ffd23f);
    transition: width .35s ease;
  }

  /* Fraction display */
  .question {
    text-align: center;
    margin: 18px 0;
  }
  .frac {
    display: inline-flex;
    flex-direction: column;
    vertical-align: middle;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    margin: 0 8px;
  }
  .frac .top { border-bottom: 3px solid var(--text); padding: 0 10px; }
  .frac .bot { padding: 0 10px; }
  .op { font-size: 40px; vertical-align: middle; margin: 0 6px; color: var(--accent); }
  .equals { font-size: 40px; vertical-align: middle; margin: 0 6px; }

  /* Answer input */
  .answer-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
  }
  .answer-row input {
    width: 70px;
    font-size: 26px;
    text-align: center;
    padding: 8px;
    border-radius: 10px;
    border: 3px solid #3a3f7a;
    background: #0a0d24;
    color: var(--text);
  }
  .answer-row input:focus { outline: none; border-color: var(--accent); }
  .bar { font-size: 30px; color: var(--muted); }

  button.btn {
    display: block;
    margin: 8px auto;
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 0 #b8930a;
    transition: transform .08s;
  }
  button.btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8930a; }
  button.btn.secondary { background:#3a3f7a; color:var(--text); box-shadow:0 4px 0 #232752; }

  .feedback {
    text-align: center;
    min-height: 26px;
    font-size: 18px;
    font-weight: bold;
    margin-top: 6px;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  /* Fight scene */
  #fightScene {
    text-align: center;
    display: block;
  }
  canvas {
    background: linear-gradient(180deg, #1a1f4a 0%, #0a0d24 100%);
    border: 3px solid #3a3f7a;
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    height: 320px;
    display: block;
    margin: 0 auto;
  }
  .fight-hud {
    display: flex;
    justify-content: space-around;
    margin: 12px 0;
    font-size: 16px;
  }
  .hp-bar {
    width: 200px;
    height: 18px;
    background: #0a0d24;
    border-radius: 9px;
    overflow: hidden;
    margin-top: 4px;
  }
  .hp-bar > div {
    height: 100%;
    background: var(--good);
    transition: width .3s;
  }
  .attack-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <h1>⚔️ Fraction Fighters</h1>
  <div class="subtitle">Solve 5 fraction problems, then battle the stick figure boss!</div>

  <!-- MATH PHASE -->
  <div id="mathPhase">
    <div class="hud">
      <div class="stat">Level <b id="levelNum">1</b>: <b id="levelOp">Addition</b></div>
      <div class="progress"><div id="progBar"></div></div>
      <div class="stat">Streak <b id="streak">0</b>/5 • Score <b id="score">0</b></div>
    </div>

    <div class="question" id="question"></div>

    <div class="answer-row">
      <input id="ansNum" type="number" inputmode="numeric" placeholder="?" />
      <span class="bar">/</span>
      <input id="ansDen" type="number" inputmode="numeric" placeholder="?" />
    </div>

    <button class="btn" id="submitBtn">Check Answer</button>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- FIGHT PHASE -->
  <div id="fightPhase" class="hidden">
    <div class="hud">
      <div class="stat">Boss: <b id="bossName">Stick Lord</b></div>
      <div class="progress"><div id="fightProg" style="width:100%"></div></div>
      <div class="stat">Round <b id="round">1</b></div>
    </div>
    <div id="fightScene">
      <canvas id="arena" width="600" height="320"></canvas>
      <div class="fight-hud">
        <div>
          <div>You</div>
          <div class="hp-bar"><div id="playerHP" style="width:100%"></div></div>
        </div>
        <div>
          <div id="bossLabel">Stick Lord</div>
          <div class="hp-bar"><div id="bossHP" style="width:100%; background:var(--bad)"></div></div>
        </div>
      </div>
      <div style="text-align:center; color:var(--muted); font-size:13px; margin-top:8px;">
        ◀ ▶ Move &nbsp;|&nbsp; ▲ Jump &nbsp;|&nbsp; SPACE Punch &nbsp;|&nbsp; Get close to hit the boss!
      </div>
      <div class="feedback" id="fightFeedback"></div>
    </div>
  </div>

  <!-- WIN / LOSE -->
  <div id="endPhase" class="hidden" style="text-align:center;">
    <h2 id="endTitle"></h2>
    <p id="endMsg" style="margin:12px 0; color:var(--muted);"></p>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>

  <!-- LEVEL CLEAR (breath between levels) -->
  <div id="levelClearPhase" class="hidden" style="text-align:center;">
    <h2 id="clearTitle" style="color:var(--good);">🏆 Level Cleared!</h2>
    <p id="clearMsg" style="margin:12px 0; color:var(--muted); font-size:16px;"></p>
    <button class="btn" id="nextLevelBtn">Next Level ▶</button>
  </div>
</div>

<script>
/* ---------- MATH ENGINE ---------- */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a||1; }
function simplify(n,d){
  if(d===0) return [n,d];
  if(d<0){ n=-n; d=-d; }
  const g = gcd(n,d);
  return [n/g, d/g];
}
// Level → operation. Cycles after level 4.
function opForRound(round){
  const ops = ['+','-','×','÷'];
  return ops[(round-1) % ops.length];
}
function levelName(round){
  const names = { '+':'Addition', '-':'Subtraction', '×':'Multiplication', '÷':'Division' };
  return names[opForRound(round)] || 'Mixed';
}

function makeQuestion(){
  const op = opForRound(state.round);
  let a,b,c,d,num,den;

  if(op === '×'){
    // Multiplication: (a/b) × (c/d) — keep small
    b = rand(2,8); d = rand(2,8);
    a = rand(1, b-1); c = rand(1, d-1);
    num = a*c; den = b*d;
  } else if(op === '÷'){
    // Division: (a/b) ÷ (c/d) = (a*d)/(b*c) — keep small, avoid divide-by-zero
    b = rand(2,8); d = rand(2,8);
    a = rand(1, b-1); c = rand(1, d-1);
    num = a*d; den = b*c;
  } else {
    // Addition & Subtraction
    const mode = Math.random();
    if(mode < 0.35){
      // like denominators (easy)
      d = rand(2,8); b = d;
      a = rand(1, d-1); c = rand(1, d-1);
    } else if(mode < 0.75){
      // unlike, friendly LCD (one is a multiple of the other)
      b = rand(2,5); d = b * rand(2,3);
      a = rand(1, b-1); c = rand(1, d-1);
    } else {
      // unlike, small denominators that share a factor
      const pairs = [[2,4],[3,6],[2,6],[3,4],[2,3],[4,6],[2,8],[3,8]];
      const [pb,pd] = pairs[rand(0, pairs.length-1)];
      b = pb; d = pd;
      a = rand(1, b-1); c = rand(1, d-1);
    }
    if(op==='+'){ num = a*d + c*b; den = b*d; }
    else {
      // ensure positive, NON-ZERO result
      if((a/b) <= (c/d)){ [a,c]=[c,a]; [b,d]=[d,b]; }
      num = a*d - c*b; den = b*d;
    }
  }

  // guard: never produce a zero numerator
  let guard = 0;
  while(num === 0 && guard < 10){
    c = rand(1, Math.max(2, d-1));
    if(op==='+'){ num = a*d + c*b; }
    else if(op==='-'){ if((a/b) <= (c/d)){ [a,c]=[c,a]; [b,d]=[d,b]; } num = a*d - c*b; }
    else if(op==='×'){ num = a*c; }
    else { num = a*d; den = b*c; }
    guard++;
  }

  const [rn, rd] = simplify(num, den);
  return { a,b,c,d,op, answerNum: rn, answerDen: rd };
}
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

/* ---------- GAME STATE ---------- */
const state = {
  streak: 0,
  score: 0,
  current: null,
  playerHP: 100,
  bossHP: 100,
  bossMaxHP: 100,
  round: 1,
  bossName: "Stick Lord"
};

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const mathPhase = $('mathPhase');
const fightPhase = $('fightPhase');
const endPhase = $('endPhase');
const levelClearPhase = $('levelClearPhase');

/* ---------- MATH PHASE ---------- */
function renderQuestion(){
  state.current = makeQuestion();
  const q = state.current;
  $('question').innerHTML = `
    <span class="frac"><span class="top">${q.a}</span><span class="bot">${q.b}</span></span>
    <span class="op">${q.op}</span>
    <span class="frac"><span class="top">${q.c}</span><span class="bot">${q.d}</span></span>
    <span class="equals">=</span>
    <span class="frac"><span class="top">?</span><span class="bot">?</span></span>
  `;
  $('ansNum').value=''; $('ansDen').value='';
  $('ansNum').focus();
  $('feedback').textContent='';
  $('feedback').className='feedback';
}

function checkAnswer(){
  const q = state.current;
  const un = parseInt($('ansNum').value, 10);
  const ud = parseInt($('ansDen').value, 10);
  if(isNaN(un) || isNaN(ud) || ud===0){
    showFB("Type a number on top and bottom (bottom can't be 0).", false);
    return;
  }
  // Accept ANY equivalent fraction (cross-multiply), not just simplified form
  const correct = (un * q.answerDen) === (q.answerNum * ud);
  if(correct){
    state.streak++;
    state.score += 10;
    const [sn,sd] = simplify(un,ud);
    showFB(`✅ Correct! ${sn}/${sd}`, true);
    updateHUD();
    if(state.streak >= 5){
      showFB(`🔥 5 in a row! Get ready to FIGHT!`, true);
      setTimeout(startFight, 1200);
    } else {
      setTimeout(renderQuestion, 1100);
    }
  } else {
    state.streak = 0;
    showFB(`❌ Nope. Answer: ${q.answerNum}/${q.answerDen}`, false);
    updateHUD();
    setTimeout(renderQuestion, 1600);
  }
}

function showFB(msg, good){
  const f = $('feedback');
  f.textContent = msg;
  f.className = 'feedback ' + (good?'good':'bad');
}

function updateHUD(){
  $('streak').textContent = state.streak;
  $('score').textContent = state.score;
  $('levelNum').textContent = state.round;
  $('levelOp').textContent = levelName(state.round);
  $('progBar').style.width = Math.min(100, state.streak*20) + '%';
}

$('submitBtn').addEventListener('click', checkAnswer);
['ansNum','ansDen'].forEach(id=>{
  $(id).addEventListener('keydown', e=>{ if(e.key==='Enter') checkAnswer(); });
});

/* ---------- FIGHT PHASE (platformer brawl) ---------- */
const canvas = $('arena');
const ctx = canvas.getContext('2d');
const GROUND_Y = 270;          // y of the floor (feet line)
const GRAVITY = 0.8;
const MOVE_SPEED = 3.5;
const JUMP_V = -13;
const PUNCH_RANGE = 55;        // distance to land a punch
const PUNCH_COOLDOWN = 18;     // frames
const BOSS_REACH = 50;

let animFrame = null;
let fightActive = false;
let particles = [];
let keys = {};

const bosses = ["Stick Lord","Paper Ninja","Chalk Bandit","Ruler Reaper","Eraser Knight"];

// Player & boss as physics bodies
let player, boss;

function resetBodies(){
  player = {
    x: 120, y: GROUND_Y, vx: 0, vy: 0,
    w: 30, h: 80, facing: 1,
    hp: 100, maxHP: 100,
    punching: 0, punchCD: 0, hurt: 0
  };
  boss = {
    x: 460, y: GROUND_Y, vx: 0, vy: 0,
    w: 30, h: 80, facing: -1,
    hp: 80 + state.round*20, maxHP: 80 + state.round*20,
    punching: 0, punchCD: 0, hurt: 0,
    aiTimer: 0, aiState: 'approach'
  };
}

function startFight(){
  mathPhase.classList.add('hidden');
  fightPhase.classList.remove('hidden');
  state.bossName = bosses[(state.round-1) % bosses.length];
  state.playerHP = 100;
  resetBodies();
  state.bossHP = boss.hp;
  state.bossMaxHP = boss.maxHP;
  $('bossName').textContent = state.bossName;
  $('bossLabel').textContent = state.bossName;
  $('round').textContent = state.round;
  updateFightHUD();
  $('fightFeedback').textContent = `A wild ${state.bossName} appears! Move with ◀ ▶, jump ▲, punch SPACE!`;
  $('fightFeedback').className = 'feedback good';
  fightActive = true;
  startAnim();
}

function updateFightHUD(){
  $('playerHP').style.width = Math.max(0, player ? player.hp/player.maxHP*100 : 0) + '%';
  const bp = boss ? boss.hp/boss.maxHP*100 : 0;
  $('bossHP').style.width = Math.max(0, bp) + '%';
  $('fightProg').style.width = Math.max(0, bp) + '%';
}

/* ---------- INPUT ---------- */
window.addEventListener('keydown', e=>{
  if(!fightActive) return;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  if(e.key === ' ' && player.punchCD <= 0){
    player.punching = 10;
    player.punchCD = PUNCH_COOLDOWN;
    tryPlayerHit();
  }
});
window.addEventListener('keyup', e=>{ keys[e.key] = false; });

function tryPlayerHit(){
  const dist = Math.abs(player.x - boss.x);
  if(dist <= PUNCH_RANGE){
    const dmg = 10 + rand(0,4);
    boss.hp -= dmg;
    boss.hurt = 12;
    boss.vx += player.facing * 6; // knockback
    spawnParticles(boss.x, player.y - 40, '#f87171');
    $('fightFeedback').textContent = `👊 You hit ${state.bossName} for ${dmg}!`;
    $('fightFeedback').className = 'feedback good';
    updateFightHUD();
    if(boss.hp <= 0) winFight();
  } else {
    $('fightFeedback').textContent = `Missed! Get closer to ${state.bossName}.`;
    $('fightFeedback').className = 'feedback bad';
  }
}

function tryBossHit(){
  const dist = Math.abs(player.x - boss.x);
  if(dist <= BOSS_REACH){
    const dmg = 6 + rand(0,6) + state.round*2;
    player.hp -= dmg;
    player.hurt = 12;
    player.vx += boss.facing * 6;
    spawnParticles(player.x, player.y - 40, '#ffd23f');
    $('fightFeedback').textContent = `${state.bossName} hit you for ${dmg}!`;
    $('fightFeedback').className = 'feedback bad';
    updateFightHUD();
    if(player.hp <= 0) loseFight();
  }
}

/* ---------- BOSS AI ---------- */
function updateBoss(){
  if(!fightActive) return;
  boss.aiTimer--;
  const dist = player.x - boss.x;
  boss.facing = dist > 0 ? 1 : -1;

  if(boss.aiTimer <= 0){
    // pick a new action
    const r = Math.random();
    if(Math.abs(dist) > BOSS_REACH - 5){
      boss.aiState = 'approach';
      boss.aiTimer = 30 + rand(0,30);
    } else if(r < 0.6){
      boss.aiState = 'punch';
      boss.aiTimer = 20;
    } else {
      boss.aiState = 'retreat';
      boss.aiTimer = 20 + rand(0,20);
    }
  }

  if(boss.aiState === 'approach'){
    boss.vx += boss.facing * 0.4;
  } else if(boss.aiState === 'retreat'){
    boss.vx -= boss.facing * 0.3;
  } else if(boss.aiState === 'punch'){
    boss.vx *= 0.8;
    if(boss.punchCD <= 0 && Math.abs(dist) <= BOSS_REACH){
      boss.punching = 10;
      boss.punchCD = 40;
      tryBossHit();
    }
  }
}

/* ---------- PHYSICS UPDATE ---------- */
function updateBody(b){
  b.vx *= 0.85;
  if(Math.abs(b.vx) < 0.05) b.vx = 0;
  b.x += b.vx;
  b.vy += GRAVITY;
  b.y += b.vy;
  if(b.y >= GROUND_Y){ b.y = GROUND_Y; b.vy = 0; }
  // walls
  b.x = Math.max(30, Math.min(canvas.width - 30, b.x));
  // timers
  if(b.punching > 0) b.punching--;
  if(b.punchCD > 0) b.punchCD--;
  if(b.hurt > 0) b.hurt--;
}

function updatePlayer(){
  if(!fightActive) return;
  if(keys['ArrowLeft']){ player.vx -= 0.6; player.facing = -1; }
  if(keys['ArrowRight']){ player.vx += 0.6; player.facing = 1; }
  if(keys['ArrowUp'] && player.y >= GROUND_Y){ player.vy = JUMP_V; }
  // cap speed
  player.vx = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, player.vx));
}

/* ---------- WIN / LOSE ---------- */
function winFight(){
  fightActive = false;
  $('fightFeedback').textContent = `🎉 You defeated ${state.bossName}! +50 points.`;
  $('fightFeedback').className = 'feedback good';
  state.score += 50;
  stopAnim();
  setTimeout(()=>{
    fightPhase.classList.add('hidden');
    // Show level-clear breath screen
    const nextRound = state.round + 1;
    $('clearTitle').textContent = `🏆 Level ${state.round} Cleared!`;
    $('clearMsg').innerHTML = `You beat <b>${state.bossName}</b>!<br>Score: <b>${state.score}</b><br>Next up: Level ${nextRound} — <b>${levelName(nextRound)}</b>`;
    levelClearPhase.classList.remove('hidden');
  }, 1500);
}

$('nextLevelBtn').addEventListener('click', ()=>{
  levelClearPhase.classList.add('hidden');
  state.round++;
  state.streak = 0;
  updateHUD();
  renderQuestion();
  mathPhase.classList.remove('hidden');
});

function loseFight(){
  fightActive = false;
  $('fightFeedback').textContent = `💀 ${state.bossName} knocked you out!`;
  $('fightFeedback').className = 'feedback bad';
  setTimeout(()=>{
    stopAnim();
    fightPhase.classList.add('hidden');
    endPhase.classList.remove('hidden');
    $('endTitle').textContent = '💀 Defeated!';
    $('endTitle').style.color = 'var(--bad)';
    $('endMsg').textContent = `${state.bossName} won. Final score: ${state.score}. Try again!`;
  }, 1400);
}

$('restartBtn').addEventListener('click', ()=>{
  endPhase.classList.add('hidden');
  levelClearPhase.classList.add('hidden');
  state.streak = 0;
  state.score = 0;
  state.round = 1;
  updateHUD();
  renderQuestion();
  mathPhase.classList.remove('hidden');
});

/* ---------- DRAW ---------- */
function spawnParticles(x,y,color){
  for(let i=0;i<12;i++){
    particles.push({
      x, y,
      vx: rand(-4,4), vy: rand(-5,1),
      life: 30, color
    });
  }
}

function drawGround(){
  ctx.strokeStyle = '#3a3f7a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 10); ctx.lineTo(canvas.width, GROUND_Y + 10);
  ctx.stroke();
}

function drawStick(b, color){
  ctx.save();
  ctx.translate(b.x, b.y);
  if(b.facing === -1) ctx.scale(-1,1);
  // flash white when hurt
  ctx.strokeStyle = b.hurt > 0 ? '#ffffff' : color;
  ctx.fillStyle = b.hurt > 0 ? '#ffffff' : color;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // head
  ctx.beginPath();
  ctx.arc(0, -70, 14, 0, Math.PI*2);
  ctx.stroke();
  // body
  ctx.beginPath();
  ctx.moveTo(0,-56); ctx.lineTo(0,-10);
  ctx.stroke();
  // arms
  ctx.beginPath();
  if(b.punching > 0){
    ctx.moveTo(0,-40); ctx.lineTo(34,-35);  // punching arm extended
    ctx.moveTo(0,-40); ctx.lineTo(-16,-50);
  } else {
    ctx.moveTo(0,-40); ctx.lineTo(-16,-22);
    ctx.moveTo(0,-40); ctx.lineTo(16,-22);
  }
  ctx.stroke();
  // legs (bend when moving)
  const moving = Math.abs(b.vx) > 0.5;
  ctx.beginPath();
  ctx.moveTo(0,-10);
  ctx.lineTo(moving ? -12 : -10, 10);
  ctx.moveTo(0,-10);
  ctx.lineTo(moving ? 12 : 10, 10);
  ctx.stroke();
  // eyes
  ctx.beginPath();
  ctx.arc(-4,-72,2,0,Math.PI*2);
  ctx.arc(5,-72,2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGround();

  if(fightActive){
    updatePlayer();
    updateBoss();
    updateBody(player);
    updateBody(boss);
  }

  drawStick(player, '#4ade80');
  drawStick(boss, '#f87171');

  // particles
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life/30;
    ctx.fillRect(p.x, p.y, 5, 5);
    ctx.globalAlpha = 1;
  });

  animFrame = requestAnimationFrame(loop);
}
function startAnim(){ if(!animFrame) loop(); }
function stopAnim(){ if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; } }

/* ---------- INIT ---------- */
renderQuestion();
updateHUD();
</script>
</body>
</html>
