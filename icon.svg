<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f6a"/>
      <stop offset="100%" stop-color="#0f1226"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Fraction 1/2 -->
  <text x="150" y="200" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#ffd23f" text-anchor="middle">1</text>
  <rect x="95" y="225" width="110" height="10" fill="#ffd23f"/>
  <text x="150" y="320" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#ffd23f" text-anchor="middle">2</text>
  <!-- Stick figure fighter -->
  <g stroke="#4ade80" stroke-width="8" stroke-linecap="round" fill="none" transform="translate(340,150)">
    <circle cx="0" cy="20" r="26" stroke="#4ade80"/>
    <line x1="0" y1="46" x2="0" y2="130"/>
    <line x1="0" y1="70" x2="50" y2="55"/>
    <line x1="0" y1="70" x2="-35" y2="40"/>
    <line x1="0" y1="130" x2="-25" y2="190"/>
    <line x1="0" y1="130" x2="25" y2="190"/>
  </g>
  <!-- Sword -->
  <g transform="translate(395,90) rotate(35)">
    <rect x="-3" y="0" width="6" height="80" fill="#e8ecff"/>
    <rect x="-15" y="78" width="30" height="6" fill="#ffd23f"/>
  </g>
</svg>
